# Регистры 1С Аналитики — ШАБЛОН
# Скопируйте в registers.yaml и настройте под своё окружение:
#   cp registers.example.yaml registers.yaml
#
# Затем запустите:
#   python3 scripts/sync_metadata.py   — заполнит из 1С (dimensions, resources, keywords)
#   python3 scripts/seed_metadata.py   — загрузит в metadata.db
#
# registers.yaml в .gitignore — не затирается при git pull

registers:
  - name: РегистрСведений.Витрина_Дашборда
    description: Витрина дашборда
    type: information_register

    dimensions:
      - name: Сценарий
        data_type: Строка
        required: true
        default: "Факт"
        values: ["Факт", "Прогноз", "План"]
        technical: false
        role: both
        description_en: "scenario type (Факт, План, Прогноз)"

      - name: КонтурПоказателя
        data_type: Строка
        required: true
        default: "свод"
        values: ["свод", "детализация"]
        technical: false
        role: filter
        description_en: "data contour / aggregation level"

      - name: Показатель
        data_type: Строка
        required: true
        default: null
        values: ["Выручка", "ОЗП", "Маржа", "EBITDA"]
        technical: false
        role: both
        description_en: "metric name (Выручка, Маржа, EBITDA)"

      - name: ДЗО
        data_type: Строка
        required: true
        default: null
        values: ["Консолидация", "ДЗО-1", "ДЗО-2"]
        technical: false
        role: both
        description_en: "company / subsidiary (ДЗО, организация)"

      - name: Период_Показателя
        data_type: Дата
        required: true
        default: null
        filter_type: "year_month"

      - name: Масштаб
        data_type: Строка
        required: false
        values: ["тыс.", "млн."]
        technical: true

    resources:
      - name: Сумма

    keywords:
      - выручка
      - дашборд
      - витрина
      - озп
      - маржа
